<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="description"
      content="Klok helps you to make good use of your time and boost your productivity levels"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <title>Klok</title>
    <link rel="stylesheet" href="./src/style.css" />
    <link rel="icon" href="./public/favicon-32x32.png" type="image/png" />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <h1 class="text-center">Klok</h1>
      <!-- nav -->
      <nav
        class="flex gap-4 text-xl bg-zinc-800 w-fit mx-auto rounded-md"
        id="nav"
      >
        <button
          id="time-btn"
          class="active bg-blue-700 rounded-md px-2 py-1.5 transition-colors duration-150 text-white text-[1.4rem]"
        >
          Time
        </button>
        <button
          id="alarm-btn"
          class="rounded-md px-2 py-1.5 transition-colors duration-150"
        >
          Alarm
        </button>
        <button class="rounded-md px-2 py-1.5 transition-colors duration-150">
          Stopwatch
        </button>
        <button class="rounded-md px-2 py-1.5 transition-colors duration-150">
          Timer
        </button>
      </nav>
    </header>
    <main
      class="m-8 bg-zinc-800 rounded-2xl h-[75vh] flex flex-col justify-center items-center gap-10"
    >
      <div class="time-display text-[3.5rem] text-white"></div>
      <div class="date-display text-[1.3rem]"></div>
    </main>
    <script src="./src/main.js" type="module"></script>
  </body>
</html>
