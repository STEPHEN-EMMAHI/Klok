<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="description"
      content="Klok helps you to make good use of your time and boost your productivity levels"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <title>Klok</title>
    <link rel="stylesheet" href="./src/view/style.css" />
    <link rel="stylesheet" href="./src/view/keen-slider.css" />
    <link rel="icon" href="./favicon-32x32.png" type="image/png" />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <h1 class="text-center">Klok</h1>
      <!-- nav -->
      <nav
        class="flex gap-4 text-xl bg-zinc-800 w-fit mx-auto rounded-md"
        id="nav"
      >
        <button
          aria-label="time-button"
          id="time-btn"
          class="active bg-blue-700 rounded-md px-2 py-1.5 transition-colors duration-150 text-white text-[1.4rem]"
        >
          Time
        </button>
        <button
          aria-label="alarm-button"
          id="alarm-btn"
          class="rounded-md px-2 py-1.5 transition-colors duration-150"
        >
          Alarm
        </button>
        <button
          aria-label="stopwatch button"
          class="rounded-md px-2 py-1.5 transition-colors duration-150"
        >
          Stopwatch
        </button>
        <button
          aria-label="timer-button"
          id="timer-btn"
          class="rounded-md px-2 py-1.5 transition-colors duration-150"
        >
          Timer
        </button>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="m-8 bg-zinc-800 rounded-2xl md:w-[50%] md:mx-auto">
      <!-- TIME FEATURE -->
      <div
        class="feature time-feature hidden h-fit py-14 flex-col justify-center items-center gap-10"
      >
        <p class="time-display text-[3rem] text-white"></p>
        <p class="date-display text-[1.3rem]"></p>
      </div>

      <!-- TIMER FEATURE -->
      <div class="feature timer-feature h-fit pb-6 hidden">
        <!-- timer countdown -->
        <div class="hidden text-4xl text-white" id="countdown"></div>

        <!-- timer top group -->
        <div class="top-group">
          <!-- Keen Slider container -->
          <div class="wrapper">
            <div id="hour-wheel" class="hourWheel w-44"></div>
            <div id="minute-wheel" class="minuteWheel w-44"></div>
            <div id="second-wheel" class="secondWheel w-44"></div>
          </div>
          <!-- timer schedules -->
          <div class="p-5 flex gap-2 w-full flex-wrap" id="schedules">
            <!-- meeting button -->
            <button
              data-time="00:20:00"
              aria-label="meeting-button"
              class="bg-zinc-900 p-4 flex flex-col justify-center items-center gap-2"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-7 h-7 transition-colors duration-150"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="2" y="3" width="20" height="14" rx="2" />
                <line x1="8" y1="21" x2="12" y2="17" />
                <line x1="12" y1="17" x2="16" y2="21" />
                <line x1="12" y1="3" x2="12" y2="5" />
              </svg>
              <span class="text-xl">Meeting</span>
              <span class="text-sm">00:20:00</span>
            </button>
            <!-- sleep button -->
            <button
              data-time="00:10:00"
              aria-label="sleep-button"
              class="bg-zinc-900 p-4 flex flex-col justify-center items-center gap-2"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-7 h-7 transition-colors duration-150"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                <path d="M19 3v4" />
                <path d="M17 5h4" />
              </svg>
              <span class="text-xl">Sleep</span>
              <span class="text-sm">00:10:00</span>
            </button>
            <!-- exercise button -->
            <button
              data-time="00:15:00"
              aria-label="exercise-button"
              class="bg-zinc-900 p-4 flex flex-col justify-center items-center gap-2"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-7 h-7 transition-colors duration-150"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="m6.5 6.5 11 11" />
                <path d="m21 21-1-1" />
                <path d="m3 3 1 1" />
                <path d="m18.5 5.5 3 3-2.5 2.5-3-3Z" />
                <path d="m5.5 18.5 3 3-2.5 2.5-3-3Z" />
                <path d="m10 5 3.5 3.5" />
                <path d="m14 10.5 3.5 3.5" />
              </svg>
              <span class="text-xl">Exercise</span>
              <span class="text-sm">00:15:00</span>
            </button>
            <!-- add button -->
            <button
              aria-label="schedule-button"
              class="bg-zinc-900 py-9 px-10 text-3xl"
            >
              +
            </button>
          </div>
        </div>
        <!-- timer starter -->
        <div class="timer-starter flex justify-around items-center mt-9">
          <!-- reset -->
          <div class="reset flex flex-col items-center" id="reset">
            <button
              class="p-3 text-zinc-500 active:text-zinc-300 transition-colors duration-75"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-8 h-8"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <polyline points="3 3 3 8 8 8" />
              </svg>
            </button>
            <span>Reset</span>
          </div>
          <!-- play/pause button -->
          <div class="start flex flex-col items-center gap-2" id="start">
            <button
              id="toggle-play-pause"
              class="w-14 h-14 bg-blue-600 active:bg-blue-700 flex items-center justify-center rounded-full transition-all shadow-lg lg:hover:bg-blue-700"
            >
              <!-- play icon -->
              <svg
                id="play-icon"
                xmlns="http://www.w3.org/2000/svg"
                class="w-8 h-8 translate-x-0.5"
                viewBox="0 0 24 24"
                fill="white"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polygon points="6 3 20 12 6 21 6 3" />
              </svg>
              <!-- pause icon -->
              <svg
                id="pause-icon"
                xmlns="https://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="currentColor"
                class="w-6 h-6 text-white hidden"
              >
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
              </svg>
            </button>
            <span id="play-span">Start</span>
          </div>
          <!-- sound -->
          <div class="sound flex flex-col items-center">
            <button
              class="p-3 text-zinc-500 active:text-zinc-300 transition-colors duration-75"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-8 h-8"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
                <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
              </svg>
            </button>
            <span>Sound</span>
          </div>
        </div>
        <!-- prevent start countdown when time is 0s' -->
        <p id="prevent-start" class="flex justify-center py-2"></p>
      </div>
    </main>
    <script src="./src/controller/main.js" type="module" defer></script>
  </body>
</html>
